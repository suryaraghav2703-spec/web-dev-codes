<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic selectors</title>
    <style>
        .box{
            height: 34px;
            width: 34px;
            margin: 34px;
            padding: 34px;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">hello world 1</div>
        <div class="box">hello world 1.5</div>
        <div class="box">hello world 2</div>
        <div  id= "redbox" class="box">hello world 2.5</div>
        <div class="box">hello world 3</div>
        <div class="box">hello world 4</div>
        <div class="box">hello world 5</div>
    </div>

    <script src="basic_selectors.js"></script>
</body>
</html>
