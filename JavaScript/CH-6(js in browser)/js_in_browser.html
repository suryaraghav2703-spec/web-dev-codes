<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javaScript DOM</title>
</head>
<body>
    <div class="container">
        <div class="box">this is a box</div>
    </div>
    <script>
        // DOM  ka use entire html ko map kiya ja sake as a documentary.
         document.title = "surya is good" 
         console.log(document.title)
         console.log(document.body) // iski help se console ke ander entire body dikhegi.
         document.body.style.backgroundColor = "green"; // yaha se inline css bhi add kar skte hai.
         window.document
         window.document.body
         
    </script>
</body>
</html>
