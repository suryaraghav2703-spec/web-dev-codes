<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- create a buisness name generator by combining list of adjectives and shop name and another word

Adjectives:
crazy 
amazing
fire

shop name:
engine 
food 
garments

another word:
bros 
limited
hub -->

<body>
    <script>
        let rand = Math.random();
        let first, second, third;
        // 0 0.33 0.66 1 (numbers lies)

        // let generate the Frist word
        if (rand < 0.33) {
            first = "Crazy"
        }
        else if (rand < 0.66 && rand >= 0.33) {
            first = "Amazing"
        }
        else {
            first = "Fire"
        }

        // let generate the second word
        rand = Math.random();
        if (rand < 0.33) {
            second = "Engine"
        }
        else if (rand < 0.66 && rand >= 0.33) {
            second = "Foods"
        }
        else {
            second = "Garments"
        }

        // let generate the Third word
        rand = Math.random();
        if (rand < 0.33) {
            third = "bros"
        }
        else if (rand < 0.66 && rand >= 0.33) {
            third = "limited"
        }
        else {
            third = "hub"
        }
        console.log(`${first} ${second} ${third}`);

    </script>
</body>

</html>
