<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-box</title>
    <style>
        .container{
            display:flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 20px;
            border: 1px solid red;        
        }
         .box{
            width: 100px;
            height: 100px;
            border: 2px solid green;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        } 
    </style>
</head>
<body>
    <div class="container">
         <div class="box">box</div> 
    </div>
</body>
</html>
