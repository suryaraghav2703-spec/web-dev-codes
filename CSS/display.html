<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS DISPLAY PROPERTY</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            border: 2px solid blue;
             display: inline-block;  /* if meri width and margins badhiya se obey ho to mujhe iska use karna hoga verna upar screen par margin nahi aayegi can see by just typing inline*/
            padding: 45px;
            margin: 34px;
        }
    </style>
</head>
<body>
    <div class="box">i am a box</div>
    <div class="box">also a nice box</div>
    <span>i am a good</span>
    <span>boy</span>
</body>
</html>
