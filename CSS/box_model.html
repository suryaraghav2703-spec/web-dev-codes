<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX MODEL</title>
    <style>
       *{
        margin: 0;
        padding: 0;
       }
       .box{
        background-color: aqua;
       }
       .box1{
        color: yellow;
        padding: 10px;
        margin: 25px;
        border:2px solid blue;
        height: 200px;
        box-sizing: border-box; /* iska mtlb ye hai ki height jo hai vo marging and padding dono ko mila kr hai  */
       }
       .box2{
        color: red;
        padding: 10px;
        margin: 25px;
        border:2px solid black;
        height: 200px;
        box-sizing: border-box; 
       }
    </style>
</head>
<body>
    <!-- margin collaps ka mtlb jab do box ki margin overlag hoti hai to badi wali margin ko use karte hai  -->
    <div class="box box1">I am a BOX</div>
    <div class="box box2">I am another BOX</div>
</body>
</html>
