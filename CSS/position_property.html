<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITION PROPERTY</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .box1{
            background-color: aqua;
            position: absolute;
            top: 0px;
            left: 3px;
        }
        .box2{
            background-color: azure;
            /* position: relative;
            top: 25px;
            left: 30px;
            right: 20px;
            bottom: 20px; */ 
        }
        .box3{
            background-color: antiquewhite;
        }
        .box4{
            background-color: purple;
        }

        .box{
            height: 130px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }
        .parent{
            padding: 43px;
            margin: 34px;
            border:2px solid purple;
            position: absolute;
             /* exception: transform , filter ,or prespective 
              properties can also make an element appear as positioned.*/
              
              /*transform: translate(0);
              filter: invert(0);
              perspective: 0em; */
        }

    </style>
</head>
<body>
    <div class="parent">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
</div>
</body>
</html>
