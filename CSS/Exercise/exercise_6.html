<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Animation</title>
    <style>
        *{
            
            box-sizing: border-box;
        }
        .container{
            background-color: blue;
            position: relative;
            height: 90vh;
            width: 80vw;
        }
        .box{
            height: 121px;
            width: 121px;
            background-color: red;
            position: absolute;
            border-radius: 70px;
            bottom: 0;
            left: 0;
            animation: animateX 3s linear infinite alternate, animateY 1s ease-out infinite alternate;
        }
        @keyframes animateX {
            from{
                left:0;
            }
            to{
                left:100%;
            }
        }
        @keyframes animateY {
            from{
                bottom:0;
            }
            to{
                bottom:100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
